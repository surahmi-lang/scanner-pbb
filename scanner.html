<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lensa Scanner PBB Mandiri</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { color: #2ecc71; margin-bottom: 5px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .card h3 { margin: 0 0 5px 0; font-size: 14px; color: #aaa; }
        .card p { margin: 0; font-size: 20px; font-weight: bold; color: #2ecc71; }
        #video-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #2ecc71; margin-bottom: 15px; }
        video { width: 100%; display: block; transform: scaleX(1); }
        button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #2ecc71; color: #fff; }
        .btn-primary:active { background: #27ae60; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-secondary { background: #34495e; color: #fff; font-size: 14px; padding: 10px; }
        #status { font-style: italic; color: #3498db; margin: 10px 0; font-size: 14px; min-height: 20px; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #1e1e1e; border-radius: 8px; overflow: hidden; font-size: 13px; }
        .log-table th, .log-table td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        .log-table th { background: #2c3e50; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Lensa PBB Standalone</h2>
    <p style="margin: 0 0 15px 0; font-size: 12px; color: #888;">Mode Offline Mandiri - Bebas Drama Database</p>

    <div class="dashboard">
        <div class="card">
            <h3>Total Akumulasi</h3>
            <p id="stat-total">Rp 0</p>
        </div>
        <div class="card">
            <h3>Dokumen Terscan</h3>
            <p id="stat-dokumen">0 Struk</p>
        </div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="status">Kamera siap...</div>

    <button class="btn-primary" id="btn-jepret">🚀 JEPRET & PROSES AI</button>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn-secondary" id="btn-download">💾 Unduh Laporan</button>
        <button class="btn-danger" style="padding: 10px; font-size: 14px;" id="btn-reset">🗑️ Reset Data</button>
    </div>

    <h3 style="text-align: left; margin-top: 20px; font-size: 14px; color: #aaa;">Riwayat Sesi Ini:</h3>
    <table class="log-table">
        <thead>
            <tr>
                <th>No</th>
                <th>Teks Terbaca</th>
                <th>Nominal Rupiah</th>
            </tr>
        </thead>
        <tbody id="log-body">
            <tr>
                <td colspan="3" style="text-align: center; color: #666;">Belum ada data yang discan hri ini.</td>
            </tr>
        </tbody>
    </table>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const btnJepret = document.getElementById('btn-jepret');
    const btnDownload = document.getElementById('btn-download');
    const btnReset = document.getElementById('btn-reset');

    // State Aplikasi (Disimpan di Memori HP)
    let riwayatData = JSON.parse(localStorage.getItem('pbb_riwayat')) || [];
    let akumulasiUang = parseInt(localStorage.getItem('pbb_total')) || 0;

    // Sinkronisasi Tampilan Awal Dashboard
    updateDashboard();

    // Jalankan Kamera Otomatis Penuh (Utamakan Kamera Belakang HP)
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { statusDiv.innerHTML = "Gagal memuat kamera: " + err.message; });

    // PROSES SCANNER INTELIJEN JEPRET & OCR
    btnJepret.addEventListener('click', async () => {
        statusDiv.innerHTML = "📸 Mengunci gambar...";
        btnJepret.disabled = true;

        // Ambil frame foto dari video kamera
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        statusDiv.innerHTML = "🧠 AI lokal sedang membedah teks struk (Mohon tunggu)...";

        try {
            // Jalankan Engine OCR Tesseract langsung di browser HP
            const { data: { text } } = await Tesseract.recognize(canvas, 'ind', {
                logger: m => { if(m.status === 'recognizing') statusDiv.innerHTML = `Membaca teks: ${Math.floor(m.progress * 100)}%`; }
            });

            // Ekstraksi Nominal Rupiah menggunakan Regex (Mencari nominal angka di sekitar teks pemicu)
            let nominalDitemukan = 0;
            let barisTeks = text.split("\n");
            
            for (let baris of barisTeks) {
                let bersih = baris.toUpperCase();
                if (bersih.includes("TOTAL") || bersih.includes("BAYAR") || bersih.includes("RUPIAH") || bersih.includes("RP")) {
                    let angkaMatch = baris.match(/\d[\d.,]*/g);
                    if (angkaMatch) {
                        let angkaBersih = angkaMatch[angkaMatch.length - 1].replace(/[.,]/g, "");
                        let hasilParses = parseInt(angkaBersih);
                        if (hasilParses > 1000) { // Validasi jika nominal di atas seribu rupiah
                            nominalDitemukan = hasilParses;
                            break;
                        }
                    }
                }
            }

            // Jika AI Gagal mendeteksi teks angka rupiah yang valid
            if (nominalDitemukan === 0) {
                // Skenario Cadangan Aman: Minta input manual lewat popup cepat biar kerjaan tidak mandek
                let koreksi = prompt("AI mendeteksi teks namun ragu angka nominalnya. Sila ketik manual nominal Rupiah struk ini:", "0");
                nominalDitemukan = parseInt(koreksi.replace(/[.,]/g, "")) || 0;
            }

            if (nominalDitemukan > 0) {
                // Simpan Data Baru ke State
                let teksRingkas = text.substring(0, 30).replace(/\n/g, " ") + "...";
                riwayatData.push({ text: teksRingkas, nominal: nominalDitemukan });
                akumulasiUang += nominalDitemukan;

                // Amankan ke memori HP biar kalau halaman ketutup data tidak hilang
                localStorage.setItem('pbb_riwayat', JSON.stringify(riwayatData));
                localStorage.setItem('pbb_total', akumulasiUang);

                updateDashboard();
                statusDiv.innerHTML = "🟢 Berhasil ditambahkan ke akumulasi!";
            } else {
                statusDiv.innerHTML = "🟡 Scan dibatalkan / nominal Rp 0.";
            }

        } catch (error) {
            statusDiv.innerHTML = "❌ Gagal memproses: " + error.message;
        } finally {
            btnJepret.disabled = false;
        }
    });

    // FUNGSI UPDATE DASHBOARD & TABEL RIWAYAT
    function updateDashboard() {
        document.getElementById('stat-total').innerHTML = "Rp " + akumulasiUang.toLocaleString('id-ID');
        document.getElementById('stat-dokumen').innerHTML = riwayatData.length + " Struk";

        const tbody = document.getElementById('log-body');
        if (riwayatData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #666;">Belum ada data yang discan hari ini.</td></tr>`;
            return;
        }

        tbody.innerHTML = riwayatData.map((data, index) => `
            <tr>
                <td>${index + 1}</td>
                <td>${data.text}</td>
                <td style="color:#2ecc71; font-weight:bold;">Rp ${data.nominal.toLocaleString('id-ID')}</td>
            </tr>
        `).reverse().join(''); // Riwayat terbaru akan muncul di baris paling atas tabel
    }

    // DOWNLOAD LAPORAN FORMAT CSV (Bisa langsung dibuka di Excel Komputer)
    btnDownload.addEventListener('click', () => {
        if(riwayatData.length === 0) { alert("Belum ada data untuk diunduh!"); return; }
        
        let barisCsv = "No,Teks Ringkas,Nominal Rupiah\n";
        riwayatData.forEach((d, i) => {
            barisCsv += `${i+1},"${d.text.replace(/"/g, '""')}",${d.nominal}\n`;
        });
        
        const blob = new Blob([barisCsv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `Rekap_Scan_PBB_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    // RESET TOTAL DATA
    btnReset.addEventListener('click', () => {
        if (confirm("Apakah Anda yakin ingin menghapus seluruh akumulasi data scan hari ini?")) {
            localStorage.clear();
            riwayatData = [];
            akumulasiUang = 0;
            updateDashboard();
            statusDiv.innerHTML = "🗑️ Data telah dibersihkan.";
        }
    });
</script>
</body>
</html>
