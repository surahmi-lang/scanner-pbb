<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lensa Scanner PBB Mandiri - Super Ringan</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { color: #2ecc71; margin-bottom: 5px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .card h3 { margin: 0 0 5px 0; font-size: 14px; color: #aaa; }
        .card p { margin: 0; font-size: 20px; font-weight: bold; color: #2ecc71; }
        #video-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #2ecc71; margin-bottom: 15px; }
        
        /* Filter Grayscale Murni */
        video { 
            width: 100%; 
            display: block; 
            transform: scaleX(1); 
            filter: grayscale(100%); 
        }
        
        button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #2ecc71; color: #fff; }
        .btn-primary:active { background: #27ae60; }
        .btn-warning { background: #f39c12; color: #fff; font-size: 15px; padding: 12px; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-secondary { background: #34495e; color: #fff; font-size: 14px; padding: 10px; }
        #status { font-style: italic; color: #3498db; margin: 10px 0; font-size: 14px; min-height: 20px; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #1e1e1e; border-radius: 8px; overflow: hidden; font-size: 13px; }
        .log-table th, .log-table td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        .log-table th { background: #2c3e50; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Lensa PBB v2.0</h2>
    <p style="margin: 0 0 15px 0; font-size: 12px; color: #888;">Optimasi Mesin Lokal & Input Cepat</p>

    <div class="dashboard">
        <div class="card">
            <h3>Total Akumulasi</h3>
            <p id="stat-total">Rp 0</p>
        </div>
        <div class="card">
            <h3>Dokumen Terscan</h3>
            <p id="stat-dokumen">0 Struk</p>
        </div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="status">Menginisialisasi kamera...</div>

    <button class="btn-primary" id="btn-jepret">🚀 JEPRET & PROSES AI</button>
    <button class="btn-warning" id="btn-manual">✏️ KETIK MANUAL INSTAN</button>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
        <button class="btn-secondary" id="btn-download">💾 Unduh Laporan</button>
        <button class="btn-danger" style="padding: 10px; font-size: 14px;" id="btn-reset">🗑️ Reset Data</button>
    </div>

    <div style="text-align: left; margin-top: 15px; font-size: 11px; color: #666; background: #1a1a1a; padding: 8px; border-radius: 5px; min-height: 25px;">
        <strong>Teks Terakhir Di-scan AI:</strong> <span id="raw-text">-</span>
    </div>

    <h3 style="text-align: left; margin-top: 20px; font-size: 14px; color: #aaa;">Riwayat Setoran Hari Ini:</h3>
    <table class="log-table">
        <thead>
            <tr>
                <th>No</th>
                <th>Sumber Data</th>
                <th>Nominal Rupiah</th>
            </tr>
        </thead>
        <tbody id="log-body">
            <tr>
                <td colspan="3" style="text-align: center; color: #666;">Belum ada data yang tersimpan.</td>
            </tr>
        </tbody>
    </table>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const rawTextSpan = document.getElementById('raw-text');
    const btnJepret = document.getElementById('btn-jepret');
    const btnManual = document.getElementById('btn-manual');
    const btnDownload = document.getElementById('btn-download');
    const btnReset = document.getElementById('btn-reset');

    // State Data
    let riwayatData = JSON.parse(localStorage.getItem('pbb_riwayat')) || [];
    let akumulasiUang = parseInt(localStorage.getItem('pbb_total')) || 0;

    updateDashboard();

    // Akses Kamera HP (Membatasi resolusi agar mesin lokal tidak hang)
    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, 
        audio: false 
    })
    .then(stream => { 
        video.srcObject = stream; 
        statusDiv.innerHTML = "Kamera siap! Arahkan ke angka nominal.";
    })
    .catch(err => { 
        statusDiv.innerHTML = "Gagal memuat kamera. Pastikan izin kamera aktif."; 
    });

    // PROSES 1: JALUR OTOMATIS (AI SCANNER)
    btnJepret.addEventListener('click', async () => {
        statusDiv.innerHTML = "📸 Mengunci gambar...";
        btnJepret.disabled = true;

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        
        context.filter = 'grayscale(100%)';
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        statusDiv.innerHTML = "🧠 Mengaktifkan AI Lokalan...";

        try {
            // Proses OCR Kilat
            const { data: { text } } = await Tesseract.recognize(canvas, 'ind');
            rawTextSpan.innerText = text ? text.substring(0, 80).replace(/\n/g, " ") : "Tidak ada teks terdeteksi";

            let nominalDitemukan = 0;
            let barisTeks = text.split("\n");
            
            for (let baris of barisTeks) {
                let bersih = baris.toUpperCase();
                if (bersih.includes("TOTAL") || bersih.includes("BAYAR") || bersih.includes("RUPIAH") || bersih.includes("RP") || bersih.includes("JUMLAH")) {
                    let angkaMatch = baris.match(/\d[\d.,]*/g);
                    if (angkaMatch) {
                        let angkaBersih = angkaMatch[angkaMatch.length - 1].replace(/[.,]/g, "");
                        let hasilParses = parseInt(angkaBersih);
                        if (hasilParses > 1000) {
                            nominalDitemukan = hasilParses;
                            break;
                        }
                    }
                }
            }

            // Fallback Popup jika AI gagal menyaring regex angka
            if (nominalDitemukan === 0) {
                let koreksi = prompt("AI mendeteksi teks namun ragu letak nominal Rupiahnya. Silakan ketik nominal struk ini:", "0");
                nominalDitemukan = parseInt(koreksi.replace(/[.,]/g, "")) || 0;
            }

            if (nominalDitemukan > 0) {
                simpanKeDatabase("AI Scanner", nominalDitemukan);
                statusDiv.innerHTML = "🟢 Berhasil disimpan via AI!";
            } else {
                statusDiv.innerHTML = "🟡 Scan dibatalkan.";
            }

        } catch (error) {
            statusDiv.innerHTML = "⚠️ Masalah mesin lokal. Gunakan tombol input manual di bawah!";
            console.error(error);
        } finally {
            btnJepret.disabled = false;
        }
    });

    // PROSES 2: JALUR INPUT MANUAL INSTAN (FAIL-SAFE)
    btnManual.addEventListener('click', () => {
        let inputUser = prompt("Masukkan nominal Rupiah langsung (contoh: 150000):", "");
        if (inputUser === null) return; 
        
        let nominalBersih = parseInt(inputUser.replace(/[.,\s]/g, "")) || 0;
        
        if (nominalBersih > 0) {
            simpanKeDatabase("Ketik Manual", nominalBersih);
            statusDiv.innerHTML = "🟢 Berhasil disimpan via Input Manual!";
        } else {
            alert("Nominal yang dimasukkan tidak valid!");
        }
    });

    // FUNGSI INTI PENYIMPANAN
    function simpanKeDatabase(sumber, nominal) {
        riwayatData.push({ text: sumber, nominal: nominal });
        akumulasiUang += nominal;

        localStorage.setItem('pbb_riwayat', JSON.stringify(riwayatData));
        localStorage.setItem('pbb_total', akumulasiUang);

        updateDashboard();
    }

    function updateDashboard() {
        document.getElementById('stat-total').innerHTML = "Rp " + akumulasiUang.toLocaleString('id-ID');
        document.getElementById('stat-dokumen').innerHTML = riwayatData.length + " Struk";

        const tbody = document.getElementById('log-body');
        if (riwayatData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #666;">Belum ada data yang tersimpan.</td></tr>`;
            return;
        }

        tbody.innerHTML = riwayatData.map((data, index) => `
            <tr>
                <td>${index + 1}</td>
                <td><span style="background:#333; padding:2px 6px; border-radius:4px; font-size:11px;">${data.text}</span></td>
                <td style="color:#2ecc71; font-weight:bold;">Rp ${data.nominal.toLocaleString('id-ID')}</td>
            </tr>
        `).reverse().join('');
    }

    // DOWNLOAD LAPORAN CSV
    btnDownload.addEventListener('click', () => {
        if(riwayatData.length === 0) { alert("Belum ada data untuk diunduh!"); return; }
        
        let barisCsv = "No,Metode,Nominal Rupiah\n";
        riwayatData.forEach((d, i) => {
            barisCsv += `${i+1},${d.text},${d.nominal}\n`;
        });
        
        const blob = new Blob([barisCsv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `Rekap_PBB_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    // RESET TOTAL DATA
    btnReset.addEventListener('click', () => {
        if (confirm("Hapus seluruh akumulasi hitungan harian?")) {
            localStorage.clear();
            riwayatData = [];
            akumulasiUang = 0;
            rawTextSpan.innerText = "-";
            updateDashboard();
            statusDiv.innerHTML = "🗑️ Data dibersihkan.";
        }
    });
</script>
</body>
</html>
