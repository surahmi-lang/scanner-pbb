<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner PBB SPPT - Akurasi Tinggi</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { color: #2ecc71; margin-bottom: 5px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .card h3 { margin: 0 0 5px 0; font-size: 14px; color: #aaa; }
        .card p { margin: 0; font-size: 20px; font-weight: bold; color: #2ecc71; }
        
        #video-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #2ecc71; margin-bottom: 15px; }
        video { width: 100%; display: block; }
        .radar-box { position: absolute; right: 10px; bottom: 15px; width: 45%; height: 25%; border: 3px dashed #e74c3c; border-radius: 6px; pointer-events: none; box-shadow: 0 0 10px rgba(231,76,60,0.5); }
        .radar-label { position: absolute; right: 10px; bottom: 43%; color: #e74c3c; font-size: 11px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #2ecc71; color: #fff; }
        .btn-primary:active { background: #27ae60; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-secondary { background: #34495e; color: #fff; font-size: 14px; padding: 10px; }
        #status { font-style: italic; color: #3498db; margin: 10px 0; font-size: 14px; min-height: 20px; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #1e1e1e; border-radius: 8px; overflow: hidden; font-size: 13px; }
        .log-table th, .log-table td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        .log-table th { background: #2c3e50; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Lensa PBB SPPT Sniper v4.2</h2>
    <p style="margin: 0 0 15px 0; font-size: 12px; color: #888;">Peningkatan Akurasi Pembacaan Karakter Dot-Matrix</p>

    <div class="dashboard">
        <div class="card">
            <h3>Total Akumulasi</h3>
            <p id="stat-total">Rp 0</p>
        </div>
        <div class="card">
            <h3>Dokumen Terscan</h3>
            <p id="stat-dokumen">0 Struk</p>
        </div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="radar-label">Posisikan Angka Nominal Di Sini 👇</div>
        <div class="radar-box"></div>
    </div>

    <div id="status">Sejajarkan nilai rupiah di dalam kotak merah putus-putus...</div>

    <button class="btn-primary" id="btn-jepret">🚀 SCAN NOMINAL SEKARANG</button>
    <button class="btn-warning" style="padding: 10px; font-size: 14px;" id="btn-manual">✏️ INPUT MANUAL CEPAT</button>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
        <button class="btn-secondary" id="btn-download">💾 Unduh Laporan</button>
        <button class="btn-danger" style="padding: 10px; font-size: 14px;" id="btn-reset">🗑️ Reset Data</button>
    </div>

    <h3 style="text-align: left; margin-top: 20px; font-size: 14px; color: #aaa;">Riwayat Setoran Valid:</h3>
    <table class="log-table">
        <thead>
            <tr>
                <th>No</th>
                <th>Metode Catat</th>
                <th>Nominal Rupiah</th>
            </tr>
        </thead>
        <tbody id="log-body">
            <tr>
                <td colspan="3" style="text-align: center; color: #666;">Belum ada data.</td>
            </tr>
        </tbody>
    </table>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const btnJepret = document.getElementById('btn-jepret');
    const btnManual = document.getElementById('btn-manual');
    const btnDownload = document.getElementById('btn-download');
    const btnReset = document.getElementById('btn-reset');

    let riwayatData = JSON.parse(localStorage.getItem('pbb_riwayat')) || [];
    let akumulasiUang = parseInt(localStorage.getItem('pbb_total')) || 0;

    updateDashboard();

    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }, 
        audio: false 
    })
    .then(stream => { video.srcObject = stream; })
    .catch(err => { statusDiv.innerHTML = "Gagal memuat kamera."; });

    btnJepret.addEventListener('click', async () => {
        statusDiv.innerHTML = "📸 Memproses gambar...";
        btnJepret.disabled = true;

        const context = canvas.getContext('2d');
        const vWidth = video.videoWidth;
        const vHeight = video.videoHeight;

        // Ambil porsi potongan sudut kanan bawah tempat nominal berada
        const cropWidth = vWidth * 0.45;  
        const cropHeight = vHeight * 0.25; 
        const cropX = vWidth - cropWidth - 10;
        const cropY = vHeight - cropHeight - 15;

        canvas.width = cropWidth;
        canvas.height = cropHeight;

        // Gambar potongan ke kanvas
        context.drawImage(video, cropX, cropY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

        // 🧠 FILTER PRO: Mengubah piksel gambar secara manual ke Hitam-Putih murni (Binarization)
        // Ini terbukti ampuh melenyapkan corak batik background kebiruan
        const imgData = context.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            let grayscale = data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11;
            // Jika piksel agak terang (seperti warna biru batik), paksa jadi putih murni. Jika gelap (teks cetakan), jadikan hitam pekat.
            let threshold = grayscale > 110 ? 255 : 0; 
            data[i] = data[i+1] = data[i+2] = threshold;
        }
        context.putImageData(imgData, 0, 0);

        statusDiv.innerHTML = "🧠 Mengonversi karakter dot-matrix...";

        try {
            // Jalankan OCR tesseract khusus membaca baris angka saja
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
                tessedit_char_whitelist: '0123456789'
            });

            // Hilangkan semua spasi atau sisa noise non-angka
            let angkaMurni = text.replace(/[^0-9]/g, "");
            let nominalDitemukan = parseInt(angkaMurni) || 0;

            // Logika Koreksi Nilai Nominal Desimal/Ribuan
            if (nominalDitemukan > 0 && nominalDitemukan < 1000) {
                nominalDitemukan = nominalDitemukan * 1000;
            }

            // Validasi kecocokan data dengan popup dinamis yang rapi jika terjadi miss-read
            if (nominalDitemukan === 0 || nominalDitemukan < 5000) {
                let koreksi = prompt("AI mendeteksi angka namun kurang presisi. Silakan konfirmasi atau ketik nominal rupiah struk ini:", "73000");
                nominalDitemukan = parseInt(koreksi.replace(/[.,\s]/g, "")) || 0;
            }

            if (nominalDitemukan > 0) {
                // Cegah data ganda berturut-turut
                if (riwayatData.length > 0 && riwayatData[riwayatData.length - 1].nominal === nominalDitemukan) {
                    let konfirmasi = confirm(`⚠️ Nominal Rp ${nominalDitemukan.toLocaleString('id-ID')} sama dengan data sebelumnya. Tetap simpan?`);
                    if (!konfirmasi) {
                        statusDiv.innerHTML = "🟡 Scan duplikat dibatalkan.";
                        btnJepret.disabled = false;
                        return;
                    }
                }

                simpanData("AI Sniper", nominalDitemukan);
                statusDiv.innerHTML = "🟢 Berhasil disimpan!";
            } else {
                statusDiv.innerHTML = "🟡 Scan dibatalkan.";
            }

        } catch (error) {
            statusDiv.innerHTML = "❌ Gagal memproses visual. Gunakan opsi input manual.";
        } finally {
            btnJepret.disabled = false;
        }
    });

    btnManual.addEventListener('click', () => {
        let inputUser = prompt("Masukkan nominal Rupiah langsung:", "73000");
        if (!inputUser) return;
        let nominalBersih = parseInt(inputUser.replace(/[.,\s]/g, "")) || 0;
        if (nominalBersih > 0) {
            simpanData("Manual", nominalBersih);
            statusDiv.innerHTML = "🟢 Berhasil disimpan secara manual!";
        }
    });

    function simpanData(metode, nominal) {
        riwayatData.push({ text: metode, nominal: nominal });
        akumulasiUang += nominal;
        localStorage.setItem('pbb_riwayat', JSON.stringify(riwayatData));
        localStorage.setItem('pbb_total', akumulasiUang);
        updateDashboard();
    }

    function updateDashboard() {
        document.getElementById('stat-total').innerHTML = "Rp " + akumulasiUang.toLocaleString('id-ID');
        document.getElementById('stat-dokumen').innerHTML = riwayatData.length + " Struk";
        const tbody = document.getElementById('log-body');
        if (riwayatData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #666;">Belum ada data.</td></tr>`;
            return;
        }
        tbody.innerHTML = riwayatData.map((data, index) => `
            <tr>
                <td>${index + 1}</td>
                <td><span style="background:#2c3e50; padding:3px 8px; border-radius:4px; font-size:11px;">${data.text}</span></td>
                <td style="color:#2ecc71; font-weight:bold;">Rp ${data.nominal.toLocaleString('id-ID')}</td>
            </tr>
        `).reverse().join('');
    }

    btnDownload.addEventListener('click', () => {
        if(riwayatData.length === 0) { alert("Belum ada data!"); return; }
        let csv = "No,Metode,Nominal Pajak\n";
        riwayatData.forEach((d, i) => { csv += `${i+1},${d.text},${d.nominal}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `Rekap_PBB_Nominal.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    btnReset.addEventListener('click', () => {
        if (confirm("Hapus rekap harian?")) {
            localStorage.clear(); riwayatData = []; akumulasiUang = 0; updateDashboard();
            statusDiv.innerHTML = "🗑️ Data dibersihkan.";
        }
    });
</script>
</body>
</html>
