<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Suara PBB Pro</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: rgba(20, 28, 47, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-green: #00e676;
            --accent-blue: #29b6f6;
            --accent-microphone: #ff3366;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 440px; }
        header { text-align: left; margin-bottom: 25px; }
        h2 { font-size: 24px; font-weight: 800; margin: 0; color: #fff; }
        header p { margin: 4px 0 0 0; font-size: 12px; color: var(--accent-blue); font-weight: 600; text-transform: uppercase; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .card { background: var(--bg-card); padding: 16px; border-radius: 16px; border: 1px solid var(--border-color); }
        .card h3 { margin: 0 0 6px 0; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
        .card p { margin: 0; font-size: 20px; font-weight: 700; }
        #stat-total { color: var(--accent-green); }

        /* AREA MIKROFON & GELOMBANG SUARA */
        .voice-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 180px;
            box-sizing: border-box;
        }

        .mic-button {
            width: 80px; height: 80px;
            background: var(--accent-microphone);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
            transition: all 0.3s ease;
        }

        .mic-button.listening {
            animation: pulse 1.5s infinite;
            background: var(--accent-green);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
        }

        .mic-icon {
            font-size: 32px;
            color: white;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.6); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0, 230, 118, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); }
        }

        #status {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 15px;
            text-align: center;
            font-style: italic;
            min-height: 20px;
        }

        #transcript-preview {
            margin-top: 10px;
            font-size: 13px;
            color: var(--accent-blue);
            font-weight: 500;
            text-align: center;
        }

        .action-buttons { display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 16px; font-size: 15px; font-weight: 700; border-radius: 14px; border: none; cursor: pointer; transition: 0.2s; }
        .secondary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-danger { background: rgba(255, 82, 82, 0.1); color: var(--accent-red); border: 1px solid rgba(255, 82, 82, 0.2); }

        .log-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color); font-size: 14px; margin-top: 20px; }
        .log-table th, .log-table td { padding: 14px; text-align: left; }
        .log-table th { background: rgba(255,255,255,0.02); color: var(--text-secondary); font-size: 12px; border-bottom: 1px solid var(--border-color); }
        .badge { background: rgba(255,255,255,0.06); padding: 4px 8px; border-radius: 6px; font-size: 11px; }

        /* MODAL CUSTOM POPUP */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(5, 8, 15, 0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.2s; padding: 20px; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: #141c2f; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 340px; border-radius: 20px; padding: 24px; }
        .modal-box input { width: 100%; padding: 14px; background: #0b0f19; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: #fff; font-size: 24px; font-weight: 700; text-align: center; box-sizing: border-box; margin-bottom: 20px; }
        .modal-flex { display: flex; gap: 10px; }
        .btn-modal-primary { background: var(--accent-green); color: #000; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <p>Mode Ekstraksi Suara Pintar</p>
        <h2>Voice PBB Scanner</h2>
    </header>

    <div class="dashboard">
        <div class="card">
            <h3>Total Terkumpul</h3>
            <p id="stat-total">Rp 0</p>
        </div>
        <div class="card">
            <h3>Jumlah Struk</h3>
            <p id="stat-dokumen">0 Struk</p>
        </div>
    </div>

    <div class="voice-container">
        <button class="mic-button" id="btn-bicara">
            <span class="mic-icon" id="mic-icon">🎙️</span>
        </button>
        <div id="status">Ketuk mikrofon lalu sebutkan nominalnya...</div>
        <div id="transcript-preview"></div>
    </div>

    <div class="action-buttons">
        <div class="secondary-grid">
            <button class="btn-secondary" id="btn-download">💾 Unduh CSV</button>
            <button class="btn-danger" id="btn-reset">🗑️ Reset Data</button>
        </div>
    </div>

    <table class="log-table">
        <thead><tr><th>No</th><th>Metode</th><th>Nominal</th></tr></thead>
        <tbody id="log-body">
            <tr><td colspan="3" style="text-align: center; color: var(--text-secondary); padding:20px;">Belum ada rekapan harian.</td></tr>
        </tbody>
    </table>
</div>

<div class="modal-overlay" id="custom-modal">
    <div class="modal-box">
        <h3 style="margin:0 0 8px 0; font-size:18px;">Konfirmasi Hasil Suara</h3>
        <p style="margin:0 0 16px 0; font-size:13px; color:var(--text-secondary);">Berikut nominal yang didengar AI, koreksi jika salah:</p>
        <input type="number" id="modal-input">
        <div class="modal-flex">
            <button class="btn-secondary" style="margin:0; padding:12px;" id="modal-cancel">Batal</button>
            <button class="btn-modal-primary" style="margin:0; padding:12px;" id="modal-confirm">Simpan</button>
        </div>
    </div>
</div>

<script>
    const btnBbicara = document.getElementById('btn-bicara');
    const micIcon = document.getElementById('mic-icon');
    const statusDiv = document.getElementById('status');
    const previewDiv = document.getElementById('transcript-preview');
    const btnDownload = document.getElementById('btn-download');
    const btnReset = document.getElementById('btn-reset');

    const modal = document.getElementById('custom-modal');
    const modalInput = document.getElementById('modal-input');
    const modalConfirm = document.getElementById('modal-confirm');
    const modalCancel = document.getElementById('modal-cancel');

    let riwayatData = JSON.parse(localStorage.getItem('pbb_riwayat')) || [];
    let akumulasiUang = parseInt(localStorage.getItem('pbb_total')) || 0;
    let currentCallback = null;

    updateDashboard();

    // Inisialisasi Fitur Speech Recognition Browser
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening = false;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'id-ID'; // Mengunci bahasa pengenalan ke Bahasa Indonesia
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isListening = true;
            btnBbicara.classList.add('listening');
            micIcon.innerText = "🛑";
            statusDiv.innerHTML = "🔴 Mendengarkan... Sebutkan nominal sekarang.";
            previewDiv.innerHTML = "";
        };

        recognition.onspeechend = () => {
            recognition.stop();
        };

        recognition.onend = () => {
            isListening = false;
            btnBbicara.classList.remove('listening');
            micIcon.innerText = "🎙️";
        };

        recognition.onresult = (event) => {
            let hasilSuara = event.results[0][0].transcript.toLowerCase();
            previewDiv.innerHTML = `Didengar: "${hasilSuara}"`;
            
            let angkaHasilEkstraksi = konversiTeksKeAngka(hasilSuara);
            
            bukaModal(angkaHasilEkstraksi > 0 ? angkaHasilEkstraksi : "73000", function(nominalFinal) {
                if (nominalFinal > 0) {
                    riwayatData.push({ text: "Voice", nominal: nominalFinal });
                    akumulasiUang += nominalFinal;
                    localStorage.setItem('pbb_riwayat', JSON.stringify(riwayatData));
                    localStorage.setItem('pbb_total', akumulasiUang);
                    updateDashboard();
                    statusDiv.innerHTML = "🟢 Berhasil disimpan dari suara!";
                }
            });
        };

        recognition.onerror = (event) => {
            statusDiv.innerHTML = "❌ Gagal mengenali suara. Coba lagi.";
        };

    } else {
        statusDiv.innerHTML = "❌ Browser Anda tidak mendukung input suara.";
        btnBbicara.disabled = true;
    }

    btnBbicara.addEventListener('click', () => {
        if (!recognition) return;
        if (isListening) {
            recognition.stop();
        } else {
            recognition.start();
        }
    });

    // 🧠 MESIN PENERJEMAH TERREKSTUR: Mengubah ucapan lisan Indonesia menjadi Angka Murni
    function konversiTeksKeAngka(teks) {
        // Jika user langsung mengucapkan angka digit murni (misal: "73000")
        let angkaLangsung = teks.replace(/[^0-9]/g, "");
        if (angkaLangsung.length > 0) return parseInt(angkaLangsung);

        // Kamus konversi kata dasar
        const kamus = {
            'nol': 0, 'satu': 1, 'dua': 2, 'tiga': 3, 'empat': 4, 'lima': 5, 
            'enam': 6, 'tujuh': 7, 'delapan': 8, 'sembilan': 9, 'sepuluh': 10, 'sebelas': 11
        };

        let kata = teks.split(/\s+/);
        let total = 0;
        let temp = 0;

        for (let i = 0; i < kata.length; i++) {
            let k = kata[i];
            
            if (kamus[k] !== undefined) {
                temp += kamus[k];
            } else if (k === 'puluh') {
                if (temp === 0) temp = 1;
                temp *= 10;
            } else if (k === 'belas') {
                if (temp === 0) temp = 1;
                temp += 10;
            } else if (k === 'ratus') {
                if (temp === 0) temp = 1;
                temp *= 100;
            } else if (k === 'ribu') {
                if (temp === 0) temp = 1;
                total += temp * 1000;
                temp = 0;
            } else if (k === 'juta') {
                if (temp === 0) temp = 1;
                total += temp * 1000000;
                temp = 0;
            }
        }
        total += temp;
        return total;
    }

    function bukaModal(valDefault, callback) {
        modalInput.value = valDefault;
        modal.classList.add('active');
        modalInput.focus();
        currentCallback = callback;
    }

    modalCancel.addEventListener('click', () => { modal.classList.remove('active'); statusDiv.innerHTML = "<span>Ketuk mikrofon kembali untuk mendikte...</span>"; });
    modalConfirm.addEventListener('click', () => { let v = parseInt(modalInput.value) || 0; modal.classList.remove('active'); if(currentCallback) currentCallback(v); });

    function updateDashboard() {
        document.getElementById('stat-total').innerHTML = "Rp " + akumulasiUang.toLocaleString('id-ID');
        document.getElementById('stat-dokumen').innerHTML = riwayatData.length + " Struk";
        const tbody = document.getElementById('log-body');
        if (riwayatData.length === 0) return;
        tbody.innerHTML = riwayatData.map((data, index) => `
            <tr><td>${index + 1}</td><td><span class="badge" style="color:var(--accent-blue);">${data.text}</span></td><td style="color:var(--accent-green); font-weight:700;">Rp ${data.nominal.toLocaleString('id-ID')}</td></tr>
        `).reverse().join('');
    }

    btnDownload.addEventListener('click', () => {
        if(riwayatData.length === 0) return;
        let csv = "No,Metode,Nominal Pajak\n";
        riwayatData.forEach((d, i) => { csv += `${i+1},${d.text},${d.nominal}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `Rekap_PBB_Voice.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    btnReset.addEventListener('click', () => { 
        if(confirm("Hapus semua rekap data?")) { 
            localStorage.clear(); riwayatData=[]; akumulasiUang=0; updateDashboard(); 
            statusDiv.innerHTML = "🗑️ Data harian dibersihkan.";
            previewDiv.innerHTML = "";
        } 
    });
</script>
</body>
</html>
