<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner PBB - Kunci Unik NOP</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { color: #2ecc71; margin-bottom: 5px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .card h3 { margin: 0 0 5px 0; font-size: 14px; color: #aaa; }
        .card p { margin: 0; font-size: 20px; font-weight: bold; color: #2ecc71; }
        #video-container { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; border: 2px solid #2ecc71; margin-bottom: 15px; }
        video { width: 100%; display: block; filter: grayscale(100%) contrast(125%); }
        button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #2ecc71; color: #fff; }
        .btn-primary:active { background: #27ae60; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-secondary { background: #34495e; color: #fff; font-size: 14px; padding: 10px; }
        #status { font-style: italic; color: #3498db; margin: 10px 0; font-size: 14px; min-height: 20px; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #1e1e1e; border-radius: 8px; overflow: hidden; font-size: 13px; }
        .log-table th, .log-table td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        .log-table th { background: #2c3e50; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ Lensa PBB (Kunci NOP)</h2>
    <p style="margin: 0 0 15px 0; font-size: 12px; color: #888;">Validasi Duplikat Berbasis Nomor Objek Pajak</p>

    <div class="dashboard">
        <div class="card">
            <h3>Total Akumulasi</h3>
            <p id="stat-total">Rp 0</p>
        </div>
        <div class="card">
            <h3>Dokumen Terscan</h3>
            <p id="stat-dokumen">0 Struk</p>
        </div>
    </div>

    <div id="video-container">
        <video id="video" autoplay playsinline></video>
    </div>

    <div id="status">Kamera siap...</div>

    <button class="btn-primary" id="btn-jepret">🚀 JEPRET & SCAN OTOMATIS</button>
    <button class="btn-warning" style="padding: 10px; font-size: 14px;" id="btn-manual">✏️ INPUT MANUAL CEPAT</button>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
        <button class="btn-secondary" id="btn-download">💾 Unduh Laporan</button>
        <button class="btn-danger" style="padding: 10px; font-size: 14px;" id="btn-reset">🗑️ Reset Data</button>
    </div>

    <h3 style="text-align: left; margin-top: 20px; font-size: 14px; color: #aaa;">Riwayat Setoran Valid:</h3>
    <table class="log-table">
        <thead>
            <tr>
                <th>No</th>
                <th>Nomor NOP</th>
                <th>Nominal Pajak</th>
            </tr>
        </thead>
        <tbody id="log-body">
            <tr>
                <td colspan="3" style="text-align: center; color: #666;">Belum ada data.</td>
            </tr>
        </tbody>
    </table>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const btnJepret = document.getElementById('btn-jepret');
    const btnManual = document.getElementById('btn-manual');
    const btnDownload = document.getElementById('btn-download');
    const btnReset = document.getElementById('btn-reset');

    let riwayatData = JSON.parse(localStorage.getItem('pbb_riwayat')) || [];
    let akumulasiUang = parseInt(localStorage.getItem('pbb_total')) || 0;

    updateDashboard();

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { statusDiv.innerHTML = "Kamera gagal: " + err.message; });

    btnJepret.addEventListener('click', async () => {
        statusDiv.innerHTML = "📸 Mengunci gambar...";
        btnJepret.disabled = true;

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.filter = 'grayscale(100%) contrast(125%)';
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        statusDiv.innerHTML = "🧠 AI mengekstrak NOP & Nominal Rupiah...";

        try {
            const { data: { text } } = await Tesseract.recognize(canvas, 'ind');
            let nominalDitemukan = 0;
            let nopDitemukan = "";
            let barisTeks = text.split("\n");
            
            for (let baris of barisTeks) {
                let bersih = baris.toUpperCase().replace(/\s+/g, '');
                
                // 1. Ekstraksi Lintas NOP
                if (bersih.includes("NOP") || bersih.includes("73.")) {
                    let matchNop = baris.match(/[0-9./-]{10,}/g);
                    if (matchNop) {
                        nopDitemukan = matchNop[0].replace(/[^0-9]/g, ""); // Ambil deretan angka murni NOP
                    }
                }
                
                // 2. Ekstraksi Nominal Rupiah
                if (bersih.includes("SPPT") || bersih.includes("TAHUN") || bersih.includes("2025") || bersih.includes("2026")) {
                    let kumpulanAngka = baris.match(/\d[\d.,]*/g);
                    if (kumpulanAngka && kumpulanAngka.length >= 2) {
                        let angkaBersih = kumpulanAngka[kumpulanAngka.length - 1].replace(/[.,]/g, "");
                        let hasilParses = parseInt(angkaBersih);
                        if (hasilParses > 1000) {
                            nominalDitemukan = hasilParses;
                        }
                    }
                }
            }

            // Fallback Cepat jika text meleset karena tinta tipis
            if (nopDitemukan === "") {
                nopDitemukan = prompt("AI gagal membaca NOP otomatis. Silakan ketik NOP (atau 4 digit terakhir):", "730610000800303200");
                if(!nopDitemukan) { statusDiv.innerHTML = "🟡 Batalkan."; btnJepret.disabled = false; return; }
            }
            if (nominalDitemukan === 0) {
                let koreksi = prompt("Nominal tidak terbaca. Ketik angka Rupiahnya:", "73000");
                nominalDitemukan = parseInt(koreksi.replace(/[.,]/g, "")) || 0;
            }

            // 🔥 VALIDASI CRITICAL: Cek duplikasi NOP di memori HP!
            let sudahAda = riwayatData.some(item => item.nop === nopDitemukan);
            if (sudahAda) {
                alert(`⚠️ DITOLAK! Dokumen dengan NOP ${nopDitemukan} sudah pernah discan hari ini!`);
                statusDiv.innerHTML = "❌ Gagal: Terdeteksi Dokumen Duplikat.";
                btnJepret.disabled = false;
                return;
            }

            if (nominalDitemukan > 0 && nopDitemukan !== "") {
                simpanData(nopDitemukan, nominalDitemukan);
                statusDiv.innerHTML = "🟢 Berhasil disimpan!";
            } else {
                statusDiv.innerHTML = "🟡 Scan dibatalkan.";
            }

        } catch (error) {
            statusDiv.innerHTML = "❌ Error sistem lokal. Gunakan input manual!";
        } finally {
            btnJepret.disabled = false;
        }
    });

    // MANUAL JALUR CEPAT
    btnManual.addEventListener('click', () => {
        let inputNop = prompt("Masukkan nomor NOP:", "");
        if (!inputNop) return;
        
        let sudahAda = riwayatData.some(item => item.nop === inputNop.replace(/[^0-9]/g, ""));
        if (sudahAda) {
            alert(`⚠️ DITOLAK! NOP ${inputNop} sudah terdaftar!`);
            return;
        }

        let inputUser = prompt("Masukkan nominal Rupiah (Contoh: 73000):", "");
        if (!inputUser) return;
        let nominalBersih = parseInt(inputUser.replace(/[.,\s]/g, "")) || 0;
        
        if (nominalBersih > 0) {
            simpanData(inputNop.replace(/[^0-9]/g, ""), nominalBersih);
            statusDiv.innerHTML = "🟢 Berhasil disimpan secara manual!";
        }
    });

    function simpanData(nomorNop, nominal) {
        // Format NOP agar manis dilihat di tabel: 73.06...
        let displayNop = nomorNop;
        if(nomorNop.length >= 18) {
            displayNop = `${nomorNop.substring(0,2)}.${nomorNop.substring(2,4)}.${nomorNop.substring(4,7)}...`;
        }
        
        riwayatData.push({ nop: nomorNop, display: displayNop, nominal: nominal });
        akumulasiUang += nominal;
        localStorage.setItem('pbb_riwayat', JSON.stringify(riwayatData));
        localStorage.setItem('pbb_total', akumulasiUang);
        updateDashboard();
    }

    function updateDashboard() {
        document.getElementById('stat-total').innerHTML = "Rp " + akumulasiUang.toLocaleString('id-ID');
        document.getElementById('stat-dokumen').innerHTML = riwayatData.length + " Struk";
        const tbody = document.getElementById('log-body');
        if (riwayatData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #666;">Belum ada data.</td></tr>`;
            return;
        }
        tbody.innerHTML = riwayatData.map((data, index) => `
            <tr>
                <td>${index + 1}</td>
                <td style="font-family: monospace; font-size:14px; color:#3498db;">📋 ${data.display}</td>
                <td style="color:#2ecc71; font-weight:bold;">Rp ${data.nominal.toLocaleString('id-ID')}</td>
            </tr>
        `).reverse().join('');
    }

    btnDownload.addEventListener('click', () => {
        if(riwayatData.length === 0) { alert("Belum ada data!"); return; }
        let csv = "No,Nomor NOP,Nominal Pajak\n";
        riwayatData.forEach((d, i) => { csv += `${i+1},'${d.nop},${d.nominal}\n`; });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", `Rekap_PBB_NOP.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    btnReset.addEventListener('click', () => {
        if (confirm("Hapus seluruh rekap harian?")) {
            localStorage.clear(); riwayatData = []; akumulasiUang = 0; updateDashboard();
            statusDiv.innerHTML = "🗑️ Data dibersihkan.";
        }
    });
</script>
</body>
</html>
