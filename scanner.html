<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Lensa Scanner PBB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0f172a; color: #f8fafc; padding: 20px 10px; font-family: sans-serif; }
    .box { max-width: 480px; margin: 0 auto; background: #1e293b; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    video { width: 100%; border-radius: 12px; border: 3px solid #10b981; background: #000; height: 240px; object-fit: cover; }
    .btn-action { background: #10b981; color: white; font-weight: bold; font-size: 1.1rem; padding: 12px; border-radius: 12px; border: none; width: 100%; }
    .card-total { background: #0f172a; border: 2px solid #eab308; border-radius: 12px; padding: 15px; margin-top: 15px; }
    .tabel-box { max-height: 200px; overflow-y: auto; background: #0f172a; border-radius: 12px; padding: 5px; }
    table { font-size: 0.85rem; color: #f8fafc !important; margin-bottom: 0 !important; }
    th { position: sticky; top: 0; background: #1e293b !important; color: #3b82f6 !important; }
  </style>
</head>
<body>

  <div class="box text-center">
    <h4 class="fw-bold text-success mb-1">📸 AUTOMATIC SCANNER PBB</h4>
    <p class="text-white-50 small mb-3">Otomatis Membaca Nominal & Cegah Duplikat</p>

    <div class="mb-3 text-start">
      <label class="form-label small fw-bold text-white-50">Pilih Nama Kolektor:</label>
      <select id="txtKolektor" class="form-select bg-dark text-white border-secondary">
        <option value="MUSA DG PILE">MUSA DG PILE</option>
        <option value="SYAHRULLAH RAHMAN">SYAHRULLAH RAHMAN</option>
        <option value="ABD AZIS">ABD AZIS</option>
        <option value="MUH ARDI LONDONG">MUH ARDI LONDONG</option>
        <option value="ABD MAJID PT JAJI">ABD MAJID PT JAJI</option>
        <option value="ANDI ARSYAD">ANDI ARSYAD</option>
      </select>
    </div>

    <div class="position-relative mb-2">
      <video id="webcam" autoplay playsinline></video>
      <div id="statusKamera" class="position-absolute top-50 start-50 translate-middle text-white-50 small" style="display:none;">Kamera Mati</div>
    </div>

    <div class="d-flex gap-2 mb-3">
      <button class="btn btn-sm btn-success w-50 fw-bold" onclick="mulaiKamera()">🟢 Mulai Kamera</button>
      <button class="btn btn-sm btn-danger w-50 fw-bold" onclick="matikanKamera()">🔴 Matikan Kamera</button>
    </div>

    <button class="btn-action shadow mb-3" id="btnKirim" onclick="jepretDanKirimOtomatis()">🚀 JEPRET & PROSES AI</button>

    <div id="loader" style="display:none;" class="text-info my-2">
      <div class="spinner-border spinner-border-sm" role="status"></div>
      <small class="ms-2">AI sedang membaca struk & memeriksa duplikat...</small>
    </div>

    <div class="card-total text-start">
      <div class="text-white-50 small fw-bold">💰 TOTAL AKUMULASI VALID:</div>
      <div class="h3 fw-bold text-warning mt-1" id="valAkumulasi">Rp 0</div>
    </div>

    <div class="text-start mt-3">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <label class="small fw-bold text-white-50">📋 Hasil Pembacaan Struk Hari Ini:</label>
        <button class="btn btn-sm btn-outline-danger py-0 px-2" style="font-size:0.75rem" onclick="resetRiwayat()">Reset</button>
      </div>
      <div class="tabel-box">
        <table class="table table-dark table-striped text-center">
          <thead>
            <tr>
              <th>NOP</th>
              <th>Kolektor</th>
              <th>Nominal</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bodyTabelRiwayat">
            </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // =========================================================================
    // ⚠️ MASUKKAN URL WEB APP GOOGLE SHEETS (APPS SCRIPT) ANDA DI SINI
    // =========================================================================
    const URL_WEB_APP_GOOGLE = "TEMPEL_URL_WEB_APP_GOOGLE_ANDA_DI_SINI";

    const video = document.getElementById('webcam');
    var streamLokal = null;
    var formatter = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 });
    
    window.onload = function() {
      mulaiKamera();
      perbaruiTampilanDanTotal();
    };

    function mulaiKamera() {
      if (streamLokal) matikanKamera();
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } })
        .then(stream => { 
          streamLokal = stream;
          video.srcObject = stream; 
          video.style.display = "block";
          document.getElementById('statusKamera').style.display = "none";
        })
        .catch(err => { alert("Gagal akses kamera: " + err.toString()); });
    }

    function matikanKamera() {
      if (streamLokal) {
        streamLokal.getTracks().forEach(track => track.stop());
        video.srcObject = null;
        streamLokal = null;
        video.style.display = "none";
        document.getElementById('statusKamera').style.display = "block";
      }
    }

    function jepretDanKirimOtomatis() {
      if (!streamLokal) {
        alert("Nyalakan kamera terlebih dahulu!");
        return;
      }

      document.getElementById('btnKirim').disabled = true;
      document.getElementById('loader').style.display = "block";

      var canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
      var base64Data = canvas.toDataURL('image/jpeg', 0.8);
      
      var kolektor = document.getElementById('txtKolektor').value;

      fetch(URL_WEB_APP_GOOGLE, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ 'kolektor': kolektor, 'image': base64Data }).toString()
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById('btnKirim').disabled = false;
        document.getElementById('loader').style.display = "none";

        var localData = JSON.parse(localStorage.getItem('riwayat_pbb_auto')) || [];
        var totalRupiahLokal = parseInt(localStorage.getItem('total_rupiah_pbb_auto')) || 0;

        if (data.success) {
          localData.unshift({
            nop: data.nop,
            kolektor: kolektor,
            nominal: data.nominalAngka,
            status: "Sukses ✅"
          });
          totalRupiahLokal += parseInt(data.nominalAngka);
          localStorage.setItem('total_rupiah_pbb_auto', totalRupiahLokal);
        } else {
          alert("Peringatan: " + data.message);
          localData.unshift({
            nop: data.nop || "Gagal",
            kolektor: kolektor,
            nominal: 0,
            status: "Ditolak ❌"
          });
        }

        localStorage.setItem('riwayat_pbb_auto', JSON.stringify(localData));
        perbaruiTampilanDanTotal();
      })
      .catch(err => {
        alert("Koneksi terputus atau link makro salah: " + err.toString());
        document.getElementById('btnKirim').disabled = false;
        document.getElementById('loader').style.display = "none";
      });
    }

    function perbaruiTampilanDanTotal() {
      var localData = JSON.parse(localStorage.getItem('riwayat_pbb_auto')) || [];
      var totalRupiahLokal = parseInt(localStorage.getItem('total_rupiah_pbb_auto')) || 0;

      document.getElementById('valAkumulasi').innerText = formatter.format(totalRupiahLokal);

      var htmlTabel = "";
      if (localData.length === 0) {
        htmlTabel = `<tr><td colspan="4" class="text-white-50 text-center small py-3">Belum ada data scan.</td></tr>`;
      } else {
        localData.forEach(item => {
          var badgeClass = item.status.includes("Sukses") ? "bg-success" : "bg-danger";
          htmlTabel += `<tr>
            <td>${item.nop}</td>
            <td class="text-start fw-bold text-info">${item.kolektor}</td>
            <td class="text-warning fw-bold">${formatter.format(item.nominal)}</td>
            <td><span class="badge ${badgeClass}">${item.status}</span></td>
          </tr>`;
        });
      }
      document.getElementById('bodyTabelRiwayat').innerHTML = htmlTabel;
    }

    function resetRiwayat() {
      if(confirm("Hapus tampilan log layar?")) {
        localStorage.removeItem('riwayat_pbb_auto');
        localStorage.removeItem('total_rupiah_pbb_auto');
        perbaruiTampilanDanTotal();
      }
    }
  </script>
</body>
</html>
